services:
  postgres:
    image: postgres:16-alpine
    container_name: dragon-house-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dragon_house}
      POSTGRES_USER: ${POSTGRES_USER:-dragon_house}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - dragon_house_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dragon_house} -d ${POSTGRES_DB:-dragon_house}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dragon_house_postgres_data:
